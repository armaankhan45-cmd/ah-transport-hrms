version: "3.8"
services:
  hrms:
    build: .
    container_name: ah-hrms
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-please-use-strong-secret}
      DB_PATH: /app/database/hrms.sqlite
    volumes:
      - hrms_data:/app/database
      - hrms_uploads:/app/backend/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    depends_on:
      - hrms
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  hrms_data:
  hrms_uploads:
